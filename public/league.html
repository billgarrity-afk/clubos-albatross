<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<title>Albatross Golf — League Standings</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #050c08;
    --bg-panel:  #081209;
    --bg-card:   #0d1f10;
    --green:     #4ade80;
    --green-dim: rgba(74,222,128,0.1);
    --gold:      #f0c040;
    --silver:    #c0cfd8;
    --bronze:    #cd7f32;
    --white:     #f0f4f1;
    --muted:     rgba(240,244,241,0.45);
    --border:    rgba(74,222,128,0.12);
    --red:       #f87171;
    --beer:      #E8A020;
    --beer-dim:  rgba(232,160,32,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow Condensed', sans-serif; background: var(--bg); width: 1920px; height: 1080px; overflow: hidden; color: var(--white); }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 999; }

  .wrapper { display: grid; grid-template-rows: 100px 1fr 72px; height: 1080px; }

  /* HEADER */
  .header { background: var(--bg-panel); border-bottom: 2px solid var(--green); display: flex; align-items: center; justify-content: space-between; padding: 0 48px; position: relative; }
  .header::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--beer), transparent); opacity: 0.6; }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .venue-mark { width: 60px; height: 60px; border: 2px solid var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; background: var(--green-dim); }
  .venue-name { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 4px; color: var(--white); line-height: 1; }
  .venue-sub { font-size: 13px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; font-weight: 400; }
  .header-center { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
  .league-eyebrow { font-size: 12px; letter-spacing: 5px; text-transform: uppercase; color: var(--green); margin-bottom: 4px; font-weight: 600; }
  .league-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 3px; color: var(--white); line-height: 1; }
  .header-right { display: flex; align-items: center; gap: 32px; }
  .live-badge { display: flex; align-items: center; gap: 10px; background: var(--green-dim); border: 1px solid rgba(74,222,128,0.3); border-radius: 6px; padding: 8px 18px; font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--green); }
  .pulse { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }
  .week-block { text-align: right; }
  .week-num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--white); letter-spacing: 2px; line-height: 1; }
  .week-label { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .clock-block { text-align: right; }
  .live-time { font-family: 'Bebas Neue', sans-serif; font-size: 44px; color: var(--white); letter-spacing: 4px; line-height: 1; }
  .live-date { font-size: 12px; color: var(--green); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; font-weight: 600; opacity: 0.7; }

  /* MAIN */
  .main { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr 280px; overflow: hidden; }

  /* DIVISION COLUMNS */
  .div-col { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; animation: fadeUp 0.5s ease both; }
  .div-col:nth-child(1){animation-delay:0.05s}
  .div-col:nth-child(2){animation-delay:0.10s}
  .div-col:nth-child(3){animation-delay:0.15s}
  .div-col:nth-child(4){animation-delay:0.20s}
  .div-col:nth-child(5){animation-delay:0.25s}
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .div-header { padding: 14px 18px 10px; border-bottom: 1px solid var(--border); background: var(--bg-panel); flex-shrink: 0; }
  .div-eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; font-weight: 600; }
  .div-name { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; color: var(--green); line-height: 1; }
  .div-meta { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .bay-label { display: inline-flex; align-items: center; gap: 6px; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); border-radius: 4px; padding: 3px 10px; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--green); margin-top: 6px; }
  .bay-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }

  .team-list { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .team-row { display: flex; align-items: center; gap: 10px; padding: 0 18px; flex: 1; border-bottom: 1px solid rgba(74,222,128,0.05); position: relative; min-height: 0; }
  .team-row:last-child { border-bottom: none; }
  .team-row.leader { background: rgba(74,222,128,0.04); }
  .team-row.leader::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--green); box-shadow: 0 0 10px var(--green); }

  .place { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; min-width: 32px; flex-shrink: 0; }
  .place.gold   { color: var(--gold); }
  .place.silver { color: var(--silver); }
  .place.bronze { color: var(--bronze); }
  .place.other  { color: var(--muted); }

  .team-info { flex: 1; overflow: hidden; }
  .team-name { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1; letter-spacing: 0.5px; }
  .team-detail { font-size: 11px; color: var(--muted); margin-top: 1px; font-family: 'DM Mono', monospace; }
  .team-score { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--white); flex-shrink: 0; letter-spacing: 1px; line-height: 1; }
  .team-row.leader .team-score { color: var(--green); }
  .trend { font-size: 14px; flex-shrink: 0; width: 16px; text-align: center; }

  .playoffs-note { margin: 8px 12px; background: var(--beer-dim); border: 1px solid rgba(232,160,32,0.2); border-radius: 6px; padding: 8px 12px; flex-shrink: 0; }
  .playoffs-note-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--beer); margin-bottom: 2px; font-weight: 700; }
  .playoffs-note-text { font-size: 13px; color: var(--white); font-weight: 600; }

  /* SPONSOR COLUMN */
  .sponsor-col { background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; animation: fadeUp 0.5s ease 0.3s both; }
  .sponsor-main-card { margin: 18px 16px 0; background: var(--beer-dim); border: 1px solid rgba(232,160,32,0.25); border-radius: 12px; padding: 18px 16px; text-align: center; flex-shrink: 0; position: relative; overflow: hidden; }
  .sponsor-main-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--beer); }
  .sponsor-presented { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--beer); margin-bottom: 8px; font-weight: 700; }
  .sponsor-fish { font-size: 32px; margin-bottom: 6px; }
  .sponsor-brand-name { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 3px; color: var(--beer); line-height: 1; margin-bottom: 3px; }
  .sponsor-brand-sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .sponsor-divider { height: 1px; background: rgba(232,160,32,0.2); margin: 8px 0; }
  .sponsor-callout { font-size: 13px; font-weight: 700; color: var(--white); letter-spacing: 0.5px; line-height: 1.5; }
  .sponsor-cta { margin-top: 10px; background: var(--beer); color: var(--bg); font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 8px 14px; border-radius: 6px; display: block; }

  .qr-section { margin: 12px 16px 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; text-align: center; flex-shrink: 0; }
  .qr-eyebrow { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  .qr-box { width: 80px; height: 80px; background: var(--white); border-radius: 8px; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--bg); font-weight: 700; }
  .qr-text { font-size: 14px; font-weight: 700; color: var(--white); margin-bottom: 3px; }
  .qr-sub { font-size: 11px; color: var(--muted); line-height: 1.4; }

  .sponsor-col-footer { margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .powered-by { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-align: center; }
  .powered-by b { color: var(--green); }

  /* FOOTER */
  .footer { background: var(--bg-panel); border-top: 2px solid var(--border); display: flex; align-items: center; overflow: hidden; position: relative; }
  .ticker-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--green); padding: 0 24px; white-space: nowrap; flex-shrink: 0; border-right: 1px solid var(--border); font-weight: 700; }
  .ticker-track { flex: 1; overflow: hidden; position: relative; height: 100%; }
  .ticker-inner { display: flex; align-items: center; height: 100%; white-space: nowrap; animation: ticker 36s linear infinite; }
  @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .ticker-item { font-size: 20px; color: rgba(240,244,241,0.75); padding: 0 52px; letter-spacing: 0.5px; font-weight: 600; }
  .ticker-item b { color: var(--white); }
  .ticker-item .hi { color: var(--green); }
  .ticker-item .beer { color: var(--beer); }
  .footer-time { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); padding: 0 24px; flex-shrink: 0; border-left: 1px solid var(--border); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="wrapper">
  <header class="header">
    <div class="header-left">
      <div class="venue-mark">⛳</div>
      <div>
        <div class="venue-name">The Albatross</div>
        <div class="venue-sub">Indoor Golf · Cary, NC</div>
      </div>
    </div>
    <div class="header-center">
      <div class="league-eyebrow">Live Standings</div>
      <div class="league-title" id="leagueTitle">2026 Winter Golf League</div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="pulse"></div>Live Tonight</div>
      <div class="week-block">
        <div class="week-num" id="weekNum">WK 11</div>
        <div class="week-label" id="weekLabel">of 14</div>
      </div>
      <div class="clock-block">
        <div class="live-time" id="liveTime">—</div>
        <div class="live-date" id="liveDate">—</div>
      </div>
    </div>
  </header>

  <div class="main" id="mainGrid"></div>

  <footer class="footer">
    <div class="ticker-label">League News</div>
    <div class="ticker-track"><div class="ticker-inner" id="tickerInner"></div></div>
    <div class="footer-time" id="footerTime">—</div>
  </footer>
</div>

<script>
const LEAGUE = {
  title: "2026 Winter Golf League",
  week: "11", totalWeeks: "14",
  sponsor: {
    name: "VICIOUS FISHES", sub: "Craft Brewery · Cary, NC",
    callout: "Proud Sponsor of the\nWinter Golf League",
    cta: "viciousfishes.com", fish: "🐟"
  },
  divisions: [
    { letter:"A", name:"Albatross", meta:"8 teams · 14 wks", bay:"Bay 1",
      playoffNote:{label:"⚡ Playoffs",text:"Top 4 advance · Week 15"},
      teams:[
        {name:"Northwood Zaddys",   detail:"+8 this week", score:1080, trend:"↑", place:"gold"},
        {name:"Fairway to Heaven",  detail:"–45 back",     score:1035, trend:"–", place:"silver"},
        {name:"The Rough Riders",   detail:"–190 back",    score:890,  trend:"↑", place:"bronze"},
        {name:"Bogey Men",          detail:"–260 back",    score:820,  trend:"–", place:"other"},
        {name:"Iron Maidens",       detail:"–330 back",    score:750,  trend:"↓", place:"other"},
        {name:"Chip Happens",       detail:"–410 back",    score:670,  trend:"–", place:"other"}
      ]
    },
    { letter:"B", name:"Eagle", meta:"8 teams · 14 wks", bay:"Bay 2",
      playoffNote:{label:"⚡ Playoffs",text:"Top 4 advance · Week 15"},
      teams:[
        {name:"Beef Boyz",             detail:"+3 this week", score:1035, trend:"↑", place:"gold"},
        {name:"OCcasional Birdies",    detail:"–15 back",     score:1020, trend:"–", place:"silver"},
        {name:"The Schlongest Drive",  detail:"–155 back",    score:880,  trend:"↓", place:"bronze"},
        {name:"Fore Scores & 7 Beers", detail:"–230 back",    score:805,  trend:"–", place:"other"},
        {name:"Putt Pirates",          detail:"–295 back",    score:740,  trend:"↓", place:"other"},
        {name:"Driver's Ed Dropouts",  detail:"–395 back",    score:640,  trend:"–", place:"other"}
      ]
    },
    { letter:"C", name:"Birdie", meta:"8 teams · 14 wks", bay:"Bay 1",
      playoffNote:{label:"⚡ Playoffs",text:"Top 4 advance · Week 15"},
      teams:[
        {name:"Wah Gwan Delilah",  detail:"+12 this wk 🔥", score:995, trend:"↑", place:"gold"},
        {name:"Par for the Course",detail:"–20 back",        score:975, trend:"↓", place:"silver"},
        {name:"Loft Expectations", detail:"–170 back",       score:825, trend:"–", place:"bronze"},
        {name:"Tee'd & Confused",  detail:"–255 back",       score:740, trend:"↑", place:"other"},
        {name:"Full Send Freddie", detail:"–315 back",       score:680, trend:"–", place:"other"},
        {name:"Sand Trap Saints",  detail:"–390 back",       score:605, trend:"↓", place:"other"}
      ]
    },
    { letter:"D", name:"Par", meta:"8 teams · 14 wks", bay:"Bay 2",
      playoffNote:{label:"⚡ Tiebreaker",text:"Hack Attack vs Shanks · Wk 12"},
      teams:[
        {name:"Hack Attack",           detail:"Tied for lead", score:910, trend:"↑", place:"gold"},
        {name:"Shanks for Memories",   detail:"Tied for lead", score:910, trend:"↑", place:"gold"},
        {name:"The Divot Diggers",     detail:"–85 back",      score:825, trend:"–", place:"bronze"},
        {name:"Grip It & Rip It",      detail:"–160 back",     score:750, trend:"↓", place:"other"},
        {name:"Cary Golf Dads",        detail:"–220 back",     score:690, trend:"–", place:"other"},
        {name:"Mulligan's Anonymous",  detail:"–310 back",     score:600, trend:"–", place:"other"}
      ]
    },
    { letter:"E", name:"Bogey", meta:"8 teams · 14 wks", bay:"Bay 1",
      playoffNote:{label:"⚡ Playoffs",text:"Top 4 advance · Week 15"},
      teams:[
        {name:"TrackMan Cowboys",    detail:"+6 this week", score:945, trend:"↑", place:"gold"},
        {name:"The Yippers",         detail:"–35 back",     score:910, trend:"–", place:"silver"},
        {name:"Downtown Fore",       detail:"–145 back",    score:800, trend:"↑", place:"bronze"},
        {name:"Iron Byron Fan Club", detail:"–225 back",    score:720, trend:"↓", place:"other"},
        {name:"Short Game Surgeons", detail:"–290 back",    score:655, trend:"–", place:"other"},
        {name:"Club Soda Bros",      detail:"–365 back",    score:580, trend:"–", place:"other"}
      ]
    }
  ],
  ticker:[
    "🐟 <span class='beer'>Vicious Fishes Brewery</span> — Proud sponsor of the 2026 Winter League · Find them in Cary & Angier",
    "🏆 <b>Northwood Zaddys</b> lead Albatross Div with <span class='hi'>1,080 pts</span> after a big Week 11",
    "⚡ <b>Hack Attack</b> and <b>Shanks for Memories</b> dead-locked in Par Div — tiebreaker Week 12",
    "🔥 <b>Wah Gwan Delilah</b> surge into Birdie Div lead — <span class='hi'>+12 this week</span>",
    "📅 <b>Week 12</b> of 14 — Playoffs begin Week 15 · Top 4 from each division advance",
    "🏌️ Want to join next season? Scan the QR to register your team"
  ]
};

function placeLabel(place,i){
  if(place==='gold'&&i===0)return'1ST';
  if(place==='gold')return'T-1';
  if(place==='silver')return'2ND';
  if(place==='bronze')return'3RD';
  return`${i+1}TH`;
}

function render(){
  document.getElementById('leagueTitle').textContent=LEAGUE.title;
  document.getElementById('weekNum').textContent='WK '+LEAGUE.week;
  document.getElementById('weekLabel').textContent='of '+LEAGUE.totalWeeks;

  const cols=LEAGUE.divisions.map(div=>`
    <div class="div-col">
      <div class="div-header">
        <div class="div-eyebrow">Division ${div.letter}</div>
        <div class="div-name">${div.name}</div>
        <div class="div-meta">${div.meta}</div>
        <div class="bay-label"><div class="bay-dot"></div>${div.bay} Tonight</div>
      </div>
      <div class="team-list">
        ${div.teams.map((t,i)=>`
          <div class="team-row ${i===0?'leader':''}">
            <div class="place ${t.place}">${placeLabel(t.place,i)}</div>
            <div class="team-info">
              <div class="team-name">${t.name}</div>
              <div class="team-detail">${t.detail}</div>
            </div>
            <div class="team-score">${t.score.toLocaleString()}</div>
            <div class="trend" style="color:${t.trend==='↑'?'var(--green)':t.trend==='↓'?'var(--red)':'var(--muted)'}">${t.trend}</div>
          </div>
        `).join('')}
      </div>
      <div class="playoffs-note">
        <div class="playoffs-note-label">${div.playoffNote.label}</div>
        <div class="playoffs-note-text">${div.playoffNote.text}</div>
      </div>
    </div>
  `).join('');

  const sp=LEAGUE.sponsor;
  const sponsorCol=`
    <div class="sponsor-col">
      <div class="sponsor-main-card">
        <div class="sponsor-presented">Presented By</div>
        <div class="sponsor-fish">${sp.fish}</div>
        <div class="sponsor-brand-name">${sp.name}</div>
        <div class="sponsor-brand-sub">${sp.sub}</div>
        <div class="sponsor-divider"></div>
        <div class="sponsor-callout">${sp.callout.replace('\n','<br>')}</div>
        <div class="sponsor-cta">${sp.cta}</div>
      </div>
      <div class="qr-section">
        <div class="qr-eyebrow">Join Next Season</div>
        <div class="qr-box">QR</div>
        <div class="qr-text">Register Your Team</div>
        <div class="qr-sub">Scan to sign up · New leagues every 14 weeks</div>
      </div>
      <div class="sponsor-col-footer">
        <div class="powered-by">Powered by <b>ClubOS</b> · clubhousectv.com</div>
      </div>
    </div>
  `;

  document.getElementById('mainGrid').innerHTML=cols+sponsorCol;
  const items=[...LEAGUE.ticker,...LEAGUE.ticker].map(t=>`<span class="ticker-item">${t}</span>`).join('');
  document.getElementById('tickerInner').innerHTML=items;
}

function updateClock(){
  const now=new Date();
  const t=now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  const d=now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('liveTime').textContent=t;
  document.getElementById('liveDate').textContent=d;
  document.getElementById('footerTime').textContent=d+' · '+t;
}

render();
updateClock();
setInterval(updateClock,1000);
</script>
</body>
</html>
